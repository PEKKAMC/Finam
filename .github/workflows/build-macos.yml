name: Finam

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv (Fast Package Manager)
        uses: astral-sh/setup-uv@v5

      - name: Install Flet and Dependencies
        run: |
          uv pip install flet --system
          # If you have a requirements.txt, uncomment the next line:
          # uv pip install -r requirements.txt --system

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build macOS App
        run: |
          # The --yes flag auto-confirms Flutter SDK installation if needed
          flet build macos --build-version 0.0.1 --module-name main --yes --arch arm64 --exclude venv .venv .git build dist __pycache__

      - name: Isolate and Package
        run: |
          # 1. Create staging area
          mkdir -p staging_area
          
          # 2. Debug: List files to see where the app actually is
          echo "Checking for build outputs..."
          ls -R
          
          # 3. Try to find the .app file in dist/ OR build/ and move it
          # This search is more flexible
          find . -name "*.app" -maxdepth 3 -exec cp -R {} staging_area/ \;
          
          # 4. Check if we actually found anything
          if [ -z "$(ls -A staging_area)" ]; then
             echo "ERROR: No .app bundle was found! Check the 'Build macOS App' logs above."
             exit 1
          fi
          
          # 5. Zip the staging area
          cd staging_area
          zip -r ../flet_macos_final.zip .
          
          # 6. Verify final size
          du -sh ../flet_macos_final.zip

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: flet_macos_final.zips
          if-no-files-found: error