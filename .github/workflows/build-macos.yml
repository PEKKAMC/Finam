name: Finam

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv (Fast Package Manager)
        uses: astral-sh/setup-uv@v5

      - name: Install Flet and Dependencies
        run: |
          uv pip install flet --system
          # If you have a requirements.txt, uncomment the next line:
          # uv pip install -r requirements.txt --system

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build macOS App
        run: |
          # The --yes flag auto-confirms Flutter SDK installation if needed
          flet build macos --build-version 0.0.1 --module-name main --yes --arch arm64 --exclude venv .venv .git build dist __pycache__

      - name: Isolate and Package
        run: |
          # 1. Create a clean staging area outside your project folder
          mkdir ../staging
          
          # 2. Find the .app and move ONLY it to the staging area
          # Flet puts the final result in dist/macos/
          mv dist/macos/*.app ../staging/
          
          # 3. Zip ONLY what is in the staging folder
          cd ../staging
          zip -r ../flet_macos_final.zip .
          
          # 4. Verify size in logs (so you can see it in GitHub)
          du -sh ../flet_macos_final.zip

          - name: Upload Artifact
            uses: actions/upload-artifact@v4
            with:
              name: macos-app
              path: flet_macos_final.zip